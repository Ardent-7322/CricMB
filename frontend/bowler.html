<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CricMB - Bowlers</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <script>
    document.querySelector('a[href="/bowler.html"]').classList.add("active");
  </script>
  <body>
    <nav class="navbar">
      <div class="logo">Cric<span>MB</span></div>
      <div class="nav-links">
        <a href="/">Batters</a>
        <a href="/bowler.html" class="active">Bowlers</a>
        <a href="#">Teams</a>
      </div>
    </nav>

    <div class="container">
      <div class="search-section">
        <h2>Compare IPL Bowlers</h2>
        <p class="subtitle">Add up to 5 bowlers to compare</p>

        <div class="search-row">
          <div class="search-box">
            <input
              type="text"
              id="searchInput"
              placeholder="Search bowler name..."
              autocomplete="off"
            />
            <div class="suggestions" id="suggestions"></div>
          </div>
          <select id="seasonSelect">
            <option value="all">All Seasons</option>
          </select>
          <button id="compareBtn">Compare</button>
        </div>

        <div class="selected-players" id="selectedBowlers"></div>
      </div>

      <div class="results-section" id="resultsSection" style="display: none">
        <div class="stats-table-wrapper">
          <table class="stats-table" id="statsTable">
            <thead>
              <tr>
                <th>Bowler</th>
                <th>Economy</th>
                <th>Dot %</th>
                <th>SR</th>
                <th>Wickets</th>
                <th>Death Eco</th>
                <th>Wkt% RHB</th>
                <th>Wkt% LHB</th>
                <th>Innings</th>
              </tr>
            </thead>
            <tbody id="statsBody"></tbody>
          </table>
        </div>

        <div class="chart-wrapper">
          <canvas id="radarChart"></canvas>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/bowler.js"></script>
  </body>
</html>
