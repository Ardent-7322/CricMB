<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CricMB - Teams</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <svg width="140" height="36" viewBox="0 0 140 36" role="img">
          <title>CricMB</title>
          <g transform="translate(18, 18)">
            <polygon
              points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8"
              fill="none"
              stroke="currentColor"
              stroke-width="0.6"
              opacity="0.3"
            />
            <polygon
              points="0,-11 10,-5 10,5 0,11 -10,5 -10,-5"
              fill="none"
              stroke="currentColor"
              stroke-width="0.4"
              opacity="0.2"
            />
            <polygon
              points="0,-16 13,3 -7,14 -7,-14 13,3 0,-16"
              fill="#00ff88"
              fill-opacity="0.15"
              stroke="#00ff88"
              stroke-width="1.4"
              stroke-linejoin="round"
            />
            <circle cx="0" cy="-16" r="2" fill="#00ff88" />
            <circle cx="13" cy="3" r="2" fill="#00ff88" />
            <circle cx="-7" cy="14" r="2" fill="#00ff88" />
            <circle cx="-7" cy="-14" r="2" fill="#00ff88" />
          </g>
          <text
            x="40"
            y="24"
            font-family="sans-serif"
            font-size="20"
            font-weight="600"
            fill="currentColor"
          >
            Cric
            <tspan fill="#00ff88">MB</tspan>
          </text>
        </svg>
      </div>
      <div class="nav-links">
        <a href="/">Batters</a>
        <a href="/bowler.html">Bowlers</a>
        <a href="/team.html" class="active">Teams</a>
      </div>
    </nav>

    <div class="container">
      <div class="search-section">
        <h2>Compare IPL Teams</h2>
        <p class="subtitle">Add up to 5 teams to compare</p>
        <div class="search-row">
          <div class="search-box">
            <input
              type="text"
              id="searchInput"
              placeholder="Search team name..."
              autocomplete="off"
            />
            <div class="suggestions" id="suggestions"></div>
          </div>
          <select id="seasonSelect">
            <option value="all">All Seasons</option>
          </select>
          <button id="compareBtn">Compare</button>
        </div>
        <div class="selected-players" id="selectedTeams"></div>
      </div>

      <div class="results-section" id="resultsSection" style="display: none">
        <div class="stats-table-wrapper">
          <table class="stats-table" id="statsTable">
            <thead>
              <tr>
                <th>Team</th>
                <th>Win %</th>
                <th>Avg 1st Inn</th>
                <th>Avg 2nd Inn</th>
                <th>Home Win %</th>
                <th>PP Avg</th>
                <th>Death Runs</th>
                <th>Sixes/Match</th>
                <th>W/M</th>
              </tr>
            </thead>
            <tbody id="statsBody"></tbody>
          </table>
        </div>
        <div class="chart-wrapper">
          <canvas id="radarChart"></canvas>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/team.js"></script>
  </body>
</html>
